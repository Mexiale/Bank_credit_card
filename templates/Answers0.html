{% extends "_base.html" %}
{% block title %}Client stable — Bank Prediction{% endblock %}
{% block content %}
<div class="result-shell">
    <div class="result-card is-stable" data-reveal>
        <div class="result-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
        </div>
        <span class="status-pill is-stable" style="margin-bottom: var(--space-3);">Client stable</span>
        <h1>{{ prediction_text }}</h1>
        <p>Aucun signal de résiliation détecté pour ce profil. Aucune action de rétention prioritaire n'est nécessaire.</p>
        <a class="btn btn-primary" href="{{ url_for('Predic_form') }}">Tester un autre client</a>
    </div>
</div>
{% endblock %}
