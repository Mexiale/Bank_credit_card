{% extends "_base.html" %}
{% block title %}Prédiction Formulaire — Bank Prediction{% endblock %}
{% block content %}
<div class="content content-narrow">
    <div class="card" data-reveal>
        <div class="card-heading">
            <h2>Formulaire du client</h2>
            <p>Renseignez les informations du client pour estimer son risque de résiliation.</p>
        </div>

        <form action="{{ url_for('Predict') }}" method="post">
            <div class="field">
                <label for="Gender">Sexe</label>
                <select id="Gender" name="Gender" required>
                    <option value="" disabled selected>Choisissez le sexe du client</option>
                    <option value="0">Féminin</option>
                    <option value="1">Masculin</option>
                </select>
            </div>

            <div class="field">
                <label for="Customer_Age">Âge</label>
                <input id="Customer_Age" type="number" min="18" max="110" name="Customer_Age" placeholder="Ex : 40" required>
            </div>

            <div class="field">
                <label for="Total_Relationship_Count">Produits total</label>
                <input id="Total_Relationship_Count" type="number" min="0" name="Total_Relationship_Count" placeholder="Nombre total de produits du client" required>
            </div>

            <div class="field">
                <label for="Months_Inactive_12_mon">Inactivité</label>
                <input id="Months_Inactive_12_mon" type="number" min="0" max="12" name="Months_Inactive_12_mon" placeholder="Nombre de mois d'inactivité (12 derniers mois)" required>
                <span class="hint">Sur les 12 derniers mois</span>
            </div>

            <div class="field">
                <label for="Total_Revolving_Bal">Solde total</label>
                <input id="Total_Revolving_Bal" type="number" min="0" step="0.01" name="Total_Revolving_Bal" placeholder="Solde renouvelable total" required>
            </div>

            <div class="field">
                <label for="Total_Trans_Amt">Opérations totales</label>
                <input id="Total_Trans_Amt" type="number" min="0" step="0.01" name="Total_Trans_Amt" placeholder="Total des transactions (12 derniers mois)" required>
            </div>

            <div class="field">
                <label for="Avg_Utilization_Ratio">Taux d'utilisation</label>
                <input id="Avg_Utilization_Ratio" type="number" min="0" max="1" step="0.001" name="Avg_Utilization_Ratio" placeholder="Taux d'utilisation moyen de la carte (0 à 1)" required>
            </div>

            <div class="form-footer">
                <a class="back-link" href="{{ url_for('home') }}">&larr; Retour à l'accueil</a>
                <button class="btn btn-primary" type="submit">Lancer la prédiction</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
