<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bank Prediction{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%232a4a80'/%3E%3Crect x='4' y='8' width='16' height='11' rx='1.5' fill='none' stroke='white' stroke-width='2'/%3E%3Cline x1='4' y1='12' x2='20' y2='12' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page">
        <header class="site-header">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                        <line x1="2" y1="10" x2="22" y2="10"></line>
                    </svg>
                </span>
                Bank Prediction
            </a>
            <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Ouvrir le menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="nav-backdrop" id="nav-backdrop"></div>
            <nav class="site-nav" id="site-nav" data-open="false">
                <a href="{{ url_for('home') }}" class="{{ 'is-active' if request.path == url_for('home') else '' }}">Accueil</a>
                <a href="{{ url_for('Predic_form') }}" class="{{ 'is-active' if request.path == url_for('Predic_form') else '' }}">Prédiction Formulaire</a>
                <a href="{{ url_for('Predic_BD') }}" class="{{ 'is-active' if request.path == url_for('Predic_BD') else '' }}">Prédiction Base de Données</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Bank Prediction — outil interne d'anticipation de l'attrition client &middot; Design: <a href="https://github.com/Mexiale/Bank_credit_card">Grace Mexiale</a></p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
